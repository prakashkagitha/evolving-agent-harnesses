<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FCFAF6"/>
      <stop offset="1" stop-color="#F3EADC"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#35302A"/>
      <stop offset="1" stop-color="#27231D"/>
    </linearGradient>
    <linearGradient id="clay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#CE6B41"/>
      <stop offset="1" stop-color="#B5502C"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1600" height="900" fill="url(#bg)"/>

  <!-- ============ HEADER ============ -->
  <text x="80" y="86" font-size="17" font-weight="700" letter-spacing="3" fill="#C2603A">GEPA-STYLE HARNESS OPTIMIZATION &#183; BATTLESNAKE</text>
  <text x="80" y="146" font-size="50" font-weight="800" fill="#2A2118">Evolving the harness added a combat specialist</text>
  <text x="80" y="190" font-size="22" fill="#8B8073">GEPA-style optimization reflects on the bot's failures, adds a combat specialist to the harness, and keeps it only after a verified win-rate gain.</text>
  <line x1="80" y1="216" x2="1520" y2="216" stroke="#E6DCCC" stroke-width="2"/>

  <!-- ============ BEFORE CARD ============ -->
  <rect x="84" y="256" width="600" height="456" rx="20" fill="#000000" opacity="0.05"/>
  <rect x="80" y="252" width="600" height="456" rx="20" fill="#FFFFFF" stroke="#ECE2D2" stroke-width="2"/>
  <rect x="112" y="282" width="118" height="32" rx="16" fill="#F2EEE6"/>
  <text x="171" y="304" font-size="15" font-weight="700" letter-spacing="1.5" fill="#9A8E7E" text-anchor="middle">BEFORE</text>
  <text x="246" y="304" font-size="18" font-weight="600" fill="#2A2118">the &#8220;space-first&#8221; harness</text>

  <!-- planner -->
  <rect x="270" y="338" width="220" height="46" rx="12" fill="url(#dark)"/>
  <text x="380" y="367" font-size="17" font-weight="700" fill="#FFFFFF" text-anchor="middle">PLANNER</text>
  <line x1="380" y1="384" x2="380" y2="420" stroke="#CFC4B3" stroke-width="2"/>
  <text x="392" y="406" font-size="12" fill="#A99D8C">briefs each role</text>
  <!-- specialists (2) -->
  <g>
    <rect x="220" y="420" width="150" height="48" rx="12" fill="#F4EFE7" stroke="#E6DBCB" stroke-width="1.5"/>
    <circle cx="246" cy="444" r="6" fill="#4F86C6"/>
    <text x="262" y="449" font-size="15" font-weight="600" fill="#3F362B">Space control</text>
    <rect x="390" y="420" width="150" height="48" rx="12" fill="#F4EFE7" stroke="#E6DBCB" stroke-width="1.5"/>
    <circle cx="416" cy="444" r="6" fill="#3C8B68"/>
    <text x="432" y="449" font-size="15" font-weight="600" fill="#3F362B">Food</text>
  </g>
  <line x1="380" y1="468" x2="380" y2="502" stroke="#CFC4B3" stroke-width="2"/>
  <text x="392" y="490" font-size="12" fill="#A99D8C">merge into one move</text>
  <!-- referee -->
  <rect x="270" y="502" width="220" height="46" rx="12" fill="url(#dark)"/>
  <text x="380" y="531" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">REFEREE</text>
  <line x1="380" y1="548" x2="380" y2="576" stroke="#CFC4B3" stroke-width="2"/>
  <!-- bot -->
  <rect x="285" y="576" width="190" height="48" rx="13" fill="#EFE9DF" stroke="#E0D5C4" stroke-width="1.5"/>
  <text x="380" y="605" font-size="16" font-weight="700" fill="#5B5145" text-anchor="middle">PRODUCED BOT</text>
  <!-- weakness tag -->
  <rect x="112" y="650" width="456" height="40" rx="20" fill="#FBEDE8"/>
  <circle cx="138" cy="670" r="8" fill="#B5543E"/>
  <path d="M134 666 l8 8 M142 666 l-8 8" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <text x="156" y="676" font-size="16" font-weight="600" fill="#9C4733">Loses fights &#8212; only 39% wins vs the strong opponent</text>

  <!-- ============ EVOLUTION ARROW (center) ============ -->
  <rect x="700" y="356" width="200" height="74" rx="14" fill="#000000" opacity="0.05"/>
  <rect x="697" y="353" width="200" height="74" rx="14" fill="#FFFFFF" stroke="#ECE2D2" stroke-width="2"/>
  <text x="797" y="380" font-size="11" font-weight="800" letter-spacing="1.5" fill="#C2603A" text-anchor="middle">GEPA REFLECTION</text>
  <text x="797" y="404" font-size="14.5" font-style="italic" fill="#3F362B" text-anchor="middle">&#8220;I keep losing fights.</text>
  <text x="797" y="421" font-size="14.5" font-style="italic" font-weight="700" fill="#B5502C" text-anchor="middle">Add combat.&#8221;</text>
  <!-- big arrow -->
  <path d="M700 460 L856 460 L856 446 L900 470 L856 494 L856 480 L700 480 Z" fill="url(#clay)"/>
  <text x="800" y="524" font-size="13" font-weight="600" letter-spacing="0.5" fill="#A99D8C" text-anchor="middle">reflect &#8594; mutate &#8594; verify</text>

  <!-- ============ AFTER CARD ============ -->
  <rect x="924" y="256" width="600" height="456" rx="20" fill="#000000" opacity="0.05"/>
  <rect x="920" y="252" width="600" height="456" rx="20" fill="#FFFFFF" stroke="#E7C9B7" stroke-width="2.5"/>
  <rect x="952" y="282" width="106" height="32" rx="16" fill="#F6E2D6"/>
  <text x="1005" y="304" font-size="15" font-weight="700" letter-spacing="1.5" fill="#B5502C" text-anchor="middle">AFTER</text>
  <text x="1074" y="304" font-size="18" font-weight="600" fill="#2A2118">the evolved harness</text>

  <!-- planner -->
  <rect x="1110" y="338" width="220" height="46" rx="12" fill="url(#dark)"/>
  <text x="1220" y="367" font-size="17" font-weight="700" fill="#FFFFFF" text-anchor="middle">PLANNER</text>
  <line x1="1220" y1="384" x2="1220" y2="420" stroke="#CFC4B3" stroke-width="2"/>
  <text x="1232" y="406" font-size="12" fill="#A99D8C">briefs each role</text>
  <!-- specialists (3) -->
  <g>
    <rect x="1006" y="420" width="132" height="48" rx="12" fill="#F4EFE7" stroke="#E6DBCB" stroke-width="1.5"/>
    <circle cx="1026" cy="444" r="6" fill="#4F86C6"/>
    <text x="1040" y="449" font-size="13" font-weight="600" fill="#3F362B">Space control</text>
    <rect x="1154" y="420" width="132" height="48" rx="12" fill="#F4EFE7" stroke="#E6DBCB" stroke-width="1.5"/>
    <circle cx="1176" cy="444" r="6" fill="#3C8B68"/>
    <text x="1190" y="449" font-size="13" font-weight="600" fill="#3F362B">Food</text>
    <!-- COMBAT (the new one) -->
    <rect x="1286" y="404" width="164" height="80" rx="20" fill="#C2603A" opacity="0.08"/>
    <rect x="1292" y="410" width="152" height="68" rx="16" fill="#C2603A" opacity="0.16"/>
    <rect x="1302" y="420" width="132" height="48" rx="12" fill="url(#clay)"/>
    <circle cx="1325" cy="444" r="6" fill="#FFFFFF"/>
    <text x="1340" y="449" font-size="14.5" font-weight="800" fill="#FFFFFF">Combat</text>
    <rect x="1399" y="402" width="52" height="24" rx="12" fill="#2A2118"/>
    <text x="1425" y="419" font-size="12" font-weight="800" letter-spacing="1" fill="#FFFFFF" text-anchor="middle">NEW</text>
  </g>
  <line x1="1220" y1="468" x2="1220" y2="502" stroke="#CFC4B3" stroke-width="2"/>
  <text x="1232" y="490" font-size="12" fill="#A99D8C">merge into one move</text>
  <!-- referee -->
  <rect x="1110" y="502" width="220" height="46" rx="12" fill="url(#dark)"/>
  <text x="1220" y="531" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">REFEREE</text>
  <line x1="1220" y1="548" x2="1220" y2="576" stroke="#CFC4B3" stroke-width="2"/>
  <!-- bot -->
  <rect x="1125" y="576" width="190" height="48" rx="13" fill="#F6E2D6" stroke="#E7C9B7" stroke-width="1.5"/>
  <text x="1220" y="605" font-size="16" font-weight="800" fill="#B5502C" text-anchor="middle">STRONGER BOT</text>
  <!-- verified tag -->
  <rect x="952" y="650" width="480" height="40" rx="20" fill="#E2F0E9"/>
  <circle cx="978" cy="670" r="8" fill="#3C8B68"/>
  <path d="M974 670 l3 3 l6 -7" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="996" y="676" font-size="16" font-weight="700" fill="#2E6B4F">+6.0% win-rate vs its parent &#8212; verified (95% CI)</text>

  <!-- ============ FOOTER ============ -->
  <rect x="80" y="744" width="1440" height="118" rx="18" fill="url(#dark)"/>
  <text x="120" y="788" font-size="14" font-weight="700" letter-spacing="1.5" fill="#B8AD9C">CHAMPION WIN-RATE  vs a fixed opponent ladder</text>
  <text x="120" y="836" font-size="42" font-weight="800" fill="#FFFFFF">55%<tspan fill="#9A8E7E">&#8201;&#8594;&#8201;</tspan><tspan fill="#E08A5E">62%</tspan></text>
  <text x="700" y="784" font-size="14.5" fill="#CDC3B3">Every line of bot code is written by a <tspan font-weight="700" fill="#FFFFFF">small model (Haiku)</tspan>.</text>
  <text x="700" y="810" font-size="14.5" fill="#CDC3B3">The team structure is evolved by a <tspan font-weight="700" fill="#FFFFFF">larger model (Sonnet)</tspan>.</text>
  <text x="700" y="836" font-size="14.5" fill="#CDC3B3">Every change is kept only if it <tspan font-weight="700" fill="#FFFFFF">provably beats its parent</tspan> (95% confidence).</text>
</svg>
