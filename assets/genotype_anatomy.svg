<svg xmlns="http://www.w3.org/2000/svg" width="800" height="380" viewBox="0 0 800 380" font-family="system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">

  <!-- Background -->
  <rect width="800" height="380" fill="#ffffff"/>

  <!-- Title -->
  <text x="400" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">A harness genotype = structure + prompts (both evolve)</text>

  <!-- Column dividers -->
  <line x1="258" y1="52" x2="258" y2="368" stroke="#e5e7eb" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="522" y1="52" x2="522" y2="368" stroke="#e5e7eb" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ===== LEFT COLUMN: roles.json ===== -->
  <text x="129" y="68" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">roles.json</text>

  <!-- Code card -->
  <rect x="18" y="78" width="224" height="148" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <!-- Card header bar -->
  <rect x="18" y="78" width="224" height="26" rx="6" fill="#e5e7eb"/>
  <rect x="18" y="92" width="224" height="12" fill="#e5e7eb"/>
  <text x="31" y="96" font-size="12" font-weight="600" fill="#6b7280">roles.json</text>

  <!-- Code text -->
  <text x="30" y="122" font-size="11.5" fill="#111827" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">{</text>
  <text x="30" y="138" font-size="11.5" fill="#111827" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">  "roles": [</text>
  <text x="30" y="153" font-size="11.5" fill="#2563eb" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">    "draft","draft",</text>
  <text x="30" y="167" font-size="11.5" fill="#2563eb" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">    "draft","draft",</text>
  <text x="30" y="181" font-size="11.5" fill="#f59e0b" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">    "fix","fix",</text>
  <text x="30" y="195" font-size="11.5" fill="#f59e0b" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">    "fix","fix"],</text>
  <text x="30" y="210" font-size="11.5" fill="#111827" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">  "draft_model": "haiku"</text>
  <text x="30" y="224" font-size="11.5" fill="#111827" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">}</text>

  <!-- Note below card -->
  <rect x="28" y="238" width="202" height="28" rx="5" fill="#fef9c3" stroke="#fde68a" stroke-width="1"/>
  <text x="129" y="256" text-anchor="middle" font-size="11.5" fill="#92400e">step 0 is always draft</text>

  <!-- Evolved label -->
  <rect x="60" y="280" width="138" height="24" rx="5" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/>
  <text x="129" y="296" text-anchor="middle" font-size="12" font-weight="600" fill="#16a34a">&#x2713; structure evolves</text>

  <!-- ===== MIDDLE COLUMN: per-role strategy prompts ===== -->
  <text x="390" y="68" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">per-role strategy prompts</text>

  <!-- draft.md card -->
  <rect x="272" y="78" width="232" height="56" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="272" y="78" width="232" height="22" rx="6" fill="#2563eb"/>
  <rect x="272" y="88" width="232" height="12" fill="#2563eb"/>
  <text x="285" y="93" font-size="12" font-weight="600" fill="#ffffff">draft.md</text>
  <text x="388" y="113" text-anchor="middle" font-size="12" fill="#1e40af">how to write a strong first bot</text>

  <!-- critique.md card -->
  <rect x="272" y="148" width="232" height="56" rx="6" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
  <rect x="272" y="148" width="232" height="22" rx="6" fill="#7c3aed"/>
  <rect x="272" y="158" width="232" height="12" fill="#7c3aed"/>
  <text x="285" y="163" font-size="12" font-weight="600" fill="#ffffff">critique.md</text>
  <text x="388" y="183" text-anchor="middle" font-size="12" fill="#5b21b6">diagnose from engine feedback</text>

  <!-- fix.md card -->
  <rect x="272" y="218" width="232" height="56" rx="6" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="272" y="218" width="232" height="22" rx="6" fill="#f59e0b"/>
  <rect x="272" y="228" width="232" height="12" fill="#f59e0b"/>
  <text x="285" y="233" font-size="12" font-weight="600" fill="#ffffff">fix.md</text>
  <text x="388" y="253" text-anchor="middle" font-size="12" fill="#92400e">apply the critique, don&#x2019;t regress</text>

  <!-- Label below cards -->
  <text x="388" y="292" text-anchor="middle" font-size="12" fill="#6b7280">free text &#x2014;</text>
  <rect x="312" y="300" width="152" height="24" rx="5" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/>
  <text x="388" y="316" text-anchor="middle" font-size="12" font-weight="600" fill="#16a34a">&#x2713; evolved by Sonnet</text>

  <!-- ===== RIGHT COLUMN: execution chain ===== -->
  <text x="661" y="68" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">execution = keep-best chain</text>

  <!-- Step boxes: D D D D F F F F -->
  <!-- Box width=36, gap=8, total=(36*8)+(8*7)=288+56=344... scale to fit col width ~265 -->
  <!-- Use box width=28, gap=5, total=(28*8)+(5*7)=224+35=259; start x=538 -->

  <!-- Draft steps: steps 0-3 -->
  <!-- Step 0 -->
  <rect x="538" y="94" width="28" height="36" rx="4" fill="#2563eb"/>
  <text x="552" y="117" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">D</text>
  <!-- arrow -->
  <line x1="566" y1="112" x2="572" y2="112" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 1 -->
  <rect x="573" y="94" width="28" height="36" rx="4" fill="#2563eb"/>
  <text x="587" y="117" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">D</text>
  <line x1="601" y1="112" x2="607" y2="112" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="608" y="94" width="28" height="36" rx="4" fill="#2563eb"/>
  <text x="622" y="117" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">D</text>
  <line x1="636" y1="112" x2="642" y2="112" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <rect x="643" y="94" width="28" height="36" rx="4" fill="#2563eb"/>
  <text x="657" y="117" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">D</text>
  <line x1="671" y1="112" x2="677" y2="112" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Fix steps: steps 4-7 -->
  <!-- Step 4 -->
  <rect x="678" y="94" width="28" height="36" rx="4" fill="#f59e0b"/>
  <text x="692" y="117" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">F</text>
  <line x1="706" y1="112" x2="712" y2="112" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 5 -->
  <rect x="713" y="94" width="28" height="36" rx="4" fill="#f59e0b"/>
  <text x="727" y="117" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">F</text>
  <line x1="741" y1="112" x2="747" y2="112" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 6 -->
  <rect x="748" y="94" width="28" height="36" rx="4" fill="#f59e0b"/>
  <text x="762" y="117" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">F</text>
  <line x1="776" y1="112" x2="782" y2="112" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 7 -->
  <rect x="783" y="94" width="28" height="36" rx="4" fill="#f59e0b"/>
  <text x="797" y="117" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">F</text>

  <!-- Step labels under boxes -->
  <text x="552" y="142" text-anchor="middle" font-size="10" fill="#6b7280">0</text>
  <text x="587" y="142" text-anchor="middle" font-size="10" fill="#6b7280">1</text>
  <text x="622" y="142" text-anchor="middle" font-size="10" fill="#6b7280">2</text>
  <text x="657" y="142" text-anchor="middle" font-size="10" fill="#6b7280">3</text>
  <text x="692" y="142" text-anchor="middle" font-size="10" fill="#6b7280">4</text>
  <text x="727" y="142" text-anchor="middle" font-size="10" fill="#6b7280">5</text>
  <text x="762" y="142" text-anchor="middle" font-size="10" fill="#6b7280">6</text>
  <text x="797" y="142" text-anchor="middle" font-size="10" fill="#6b7280">7</text>

  <!-- D D D D  F F F F labels -->
  <text x="605" y="162" text-anchor="middle" font-size="11" fill="#2563eb" font-weight="600">D D D D</text>
  <text x="740" y="162" text-anchor="middle" font-size="11" fill="#f59e0b" font-weight="600">F F F F</text>

  <!-- Engine feedback dashed arrow: arc from below fix steps back up to step 4 -->
  <!-- Dashed line below steps going from step 7 back to step 4 area -->
  <path d="M 811 130 L 811 200 L 678 200 L 678 132" fill="none" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#redarr)"/>
  <text x="745" y="218" text-anchor="middle" font-size="11" fill="#dc2626">engine feedback</text>

  <!-- Keep best flag at end -->
  <rect x="536" y="240" width="270" height="26" rx="5" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/>
  <text x="671" y="257" text-anchor="middle" font-size="12" font-weight="600" fill="#16a34a">&#x2713; keep best bot across all steps</text>

  <!-- Winner label -->
  <rect x="590" y="280" width="162" height="24" rx="5" fill="#dcfce7" stroke="#16a34a" stroke-width="1.2"/>
  <text x="671" y="296" text-anchor="middle" font-size="12" font-weight="600" fill="#16a34a">&#x2713; structure evolves</text>

  <!-- Arrow marker definitions -->
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#6b7280"/>
    </marker>
    <marker id="redarr" markerWidth="6" markerHeight="6" refX="1" refY="3" orient="auto">
      <path d="M6,0 L0,3 L6,6 Z" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- Column header underlines -->
  <line x1="18" y1="72" x2="240" y2="72" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="272" y1="72" x2="508" y2="72" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="534" y1="72" x2="782" y2="72" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Bottom border -->
  <rect x="1" y="1" width="798" height="378" rx="8" fill="none" stroke="#e5e7eb" stroke-width="1.5"/>

</svg>
