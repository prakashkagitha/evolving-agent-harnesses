<svg xmlns="http://www.w3.org/2000/svg" width="920" height="430" viewBox="0 0 920 430" font-family="system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <!-- Background -->
  <rect width="920" height="430" fill="#ffffff"/>

  <!-- Title -->
  <text x="460" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">How the harness evolves (GEPA + verified acceptance)</text>

  <!-- Top-right tag -->
  <rect x="750" y="8" width="158" height="22" rx="5" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
  <text x="829" y="23" text-anchor="middle" font-size="11" fill="#6b7280">runs on Claude Dynamic Workflows</text>

  <!-- ===================== NODES ===================== -->

  <!-- (1) Population of harnesses — light card, stacked icon, top-left area -->
  <rect x="30" y="168" width="158" height="68" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <!-- stacked card icon -->
  <rect x="44" y="178" width="36" height="24" rx="3" fill="#e5e7eb" stroke="#d1d5db" stroke-width="1"/>
  <rect x="48" y="182" width="36" height="24" rx="3" fill="#d1d5db" stroke="#9ca3af" stroke-width="1"/>
  <rect x="52" y="186" width="36" height="24" rx="3" fill="#f9fafb" stroke="#9ca3af" stroke-width="1"/>
  <text x="109" y="197" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">Population of</text>
  <text x="109" y="213" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">harnesses</text>
  <text x="109" y="228" text-anchor="middle" font-size="11" fill="#6b7280">(generation N)</text>

  <!-- (2) Run on BattleSnake ladder — blue, top-center -->
  <rect x="232" y="58" width="180" height="68" rx="6" fill="#2563eb"/>
  <text x="322" y="80" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Run on BattleSnake ladder</text>
  <text x="322" y="97" text-anchor="middle" font-size="12" fill="#bfdbfe">Haiku plays</text>
  <text x="322" y="113" text-anchor="middle" font-size="12" fill="#bfdbfe">fitness = win-rate</text>

  <!-- (3) Sonnet reflects — violet, top-right area -->
  <rect x="462" y="58" width="178" height="68" rx="6" fill="#7c3aed"/>
  <text x="551" y="80" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Sonnet reflects</text>
  <text x="551" y="97" text-anchor="middle" font-size="12" fill="#ddd6fe">on the parent's failures</text>

  <!-- (4) Mutate ONE thing — violet, right side -->
  <rect x="700" y="168" width="188" height="68" rx="6" fill="#7c3aed"/>
  <text x="794" y="190" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Mutate ONE thing:</text>
  <text x="794" y="207" text-anchor="middle" font-size="11.5" fill="#ddd6fe">a step's type/order</text>
  <text x="794" y="222" text-anchor="middle" font-size="11.5" fill="#ddd6fe">OR a role prompt</text>

  <!-- (5) Run the child — blue, bottom-right area -->
  <rect x="640" y="318" width="188" height="68" rx="6" fill="#2563eb"/>
  <text x="734" y="341" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Run the child</text>
  <text x="734" y="358" text-anchor="middle" font-size="11.5" fill="#bfdbfe">keep-best chain</text>
  <text x="734" y="374" text-anchor="middle" font-size="11.5" fill="#bfdbfe">+ engine feedback</text>

  <!-- (6) Decision diamond — gate, center-bottom -->
  <!-- Diamond centered at (380, 356) -->
  <polygon points="380,308 480,352 380,396 280,352" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="380" y="342" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">Verified-acceptance gate</text>
  <text x="380" y="358" text-anchor="middle" font-size="11.5" fill="#111827">child &gt; parent?</text>
  <text x="380" y="373" text-anchor="middle" font-size="11" fill="#6b7280">(bootstrap 95% CI)</text>

  <!-- Caption under diamond -->
  <text x="380" y="415" text-anchor="middle" font-size="11" font-style="italic" fill="#6b7280">"the gate is what stops the search from chasing noise"</text>

  <!-- Discard box (red-muted) -->
  <rect x="116" y="333" width="110" height="38" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="171" y="350" text-anchor="middle" font-size="12" fill="#6b7280">discard</text>
  <text x="171" y="364" text-anchor="middle" font-size="11" fill="#9ca3af">(rejected child)</text>

  <!-- ===================== ARROWS ===================== -->

  <!-- (1) -> (2): Population -> BattleSnake ladder (up and right) -->
  <!-- Start: right of box (1) at ~(188, 202), up to (322, 126) -->
  <path d="M 188 202 Q 232 202 232 126" fill="none" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow-gray)"/>
  <text x="214" y="195" text-anchor="middle" font-size="11" fill="#6b7280">score</text>

  <!-- (2) -> (3): BattleSnake -> Sonnet reflects (right along top) -->
  <path d="M 412 92 L 462 92" fill="none" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow-gray)"/>
  <text x="437" y="83" text-anchor="middle" font-size="11" fill="#6b7280">failures</text>

  <!-- (3) -> (4): Sonnet reflects -> Mutate (down and right) -->
  <path d="M 640 92 Q 700 92 700 202" fill="none" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-violet)"/>
  <text x="683" y="142" text-anchor="middle" font-size="11" fill="#7c3aed">proposal</text>

  <!-- (4) -> (5): Mutate -> Run the child (down) -->
  <path d="M 794 236 L 794 318" fill="none" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow-gray)"/>
  <text x="822" y="282" text-anchor="middle" font-size="11" fill="#6b7280">child</text>

  <!-- (5) -> (6): Run the child -> Gate (left) -->
  <path d="M 640 352 L 480 352" fill="none" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow-gray)"/>
  <text x="562" y="344" text-anchor="middle" font-size="11" fill="#6b7280">win-rate</text>

  <!-- GREEN admit arrow: Gate -> Population (left, looping back) -->
  <!-- From left point of diamond (280, 352) -> down-left -> up to box (1) -->
  <path d="M 280 352 L 109 352 L 109 236" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>
  <text x="185" y="345" text-anchor="middle" font-size="11" font-weight="600" fill="#16a34a">admit</text>
  <text x="60" y="300" text-anchor="middle" font-size="10" fill="#16a34a">keeps only</text>
  <text x="60" y="313" text-anchor="middle" font-size="10" fill="#16a34a">verified gains</text>

  <!-- RED reject arrow: Gate -> Discard -->
  <path d="M 280 352 L 226 352" fill="none" stroke="#dc2626" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="252" y="344" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626">reject</text>

  <!-- ===================== ARROW MARKERS ===================== -->
  <defs>
    <marker id="arrow-gray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6b7280"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#dc2626"/>
    </marker>
    <marker id="arrow-violet" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- Step number labels -->
  <circle cx="232" cy="58" r="9" fill="#2563eb"/>
  <text x="232" y="62" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">2</text>
  <circle cx="462" cy="58" r="9" fill="#7c3aed"/>
  <text x="462" y="62" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">3</text>
  <circle cx="700" cy="168" r="9" fill="#7c3aed"/>
  <text x="700" y="172" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">4</text>
  <circle cx="700" cy="318" r="9" fill="#2563eb"/>
  <text x="700" y="322" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">5</text>
  <circle cx="30" cy="168" r="9" fill="#9ca3af"/>
  <text x="30" y="172" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">1</text>
  <circle cx="282" cy="310" r="9" fill="#ca8a04"/>
  <text x="282" y="314" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">6</text>
</svg>
