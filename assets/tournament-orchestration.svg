<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="Inter, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8F7F3"/><stop offset="1" stop-color="#EFEEE7"/>
    </linearGradient>
    <linearGradient id="clay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#CE6B41"/><stop offset="1" stop-color="#B5502C"/>
    </linearGradient>
    <!-- one contestant = a collapsed harness pipeline -->
    <g id="hg">
      <line x1="4" y1="0" x2="92" y2="0" stroke="#B9C9C0" stroke-width="2"/>
      <circle cx="8"  cy="0" r="5" fill="#2E6B52"/>
      <circle cx="34" cy="0" r="3.6" fill="#7FC0A4"/>
      <circle cx="46" cy="0" r="3.6" fill="#7FC0A4"/>
      <circle cx="58" cy="0" r="3.6" fill="#7FC0A4"/>
      <circle cx="76" cy="0" r="5" fill="#2E6B52"/>
      <circle cx="92" cy="0" r="5.5" fill="#C2603A"/>
    </g>
    <polygon id="star" points="0,-14 3.23,-4.45 13.3,-4.33 5.23,1.70 8.23,11.3 0,5.5 -8.23,11.3 -5.23,1.70 -13.3,-4.33 -3.23,-4.45" fill="#E0A23A"/>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#9A9A90"/></marker>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- header -->
  <text x="80" y="80" font-size="17" font-weight="700" letter-spacing="3" fill="#2E6B52">THE OVERALL RUN &#183; CLAUDE DYNAMIC WORKFLOWS</text>
  <text x="80" y="138" font-size="46" font-weight="800" fill="#232323">An evolutionary tournament of harnesses</text>
  <text x="80" y="180" font-size="22" fill="#7E7B73">Each contestant is a full multi-agent harness. A challenger advances only by winning a verified duel with its parent.</text>

  <!-- legend: one contestant = a harness -->
  <rect x="80" y="214" width="430" height="58" rx="12" fill="#FFFFFF" stroke="#DDE7E1" stroke-width="1.5"/>
  <use href="#hg" transform="translate(104,243)"/>
  <text x="210" y="238" font-size="14" font-weight="700" fill="#2E6B52">one contestant = a full harness</text>
  <text x="210" y="258" font-size="12.5" fill="#9A9A90">planner &#8594; specialists &#8594; referee &#8594; bot  (see the harness figure)</text>

  <!-- ===== the per-generation tournament loop ===== -->
  <!-- loop-back arrow over the top -->
  <path d="M1045 372 C 1045 322, 175 322, 175 372" fill="none" stroke="#9A9A90" stroke-width="2.5" stroke-dasharray="2 0" marker-end="url(#arr)"/>
  <text x="610" y="312" font-size="15" font-weight="700" fill="#7E7B73" text-anchor="middle">next generation &#8212; repeat &#215;4</text>

  <!-- stage boxes -->
  <!-- 1 POPULATION -->
  <g>
    <rect x="80" y="380" width="190" height="150" rx="14" fill="#D9ECE3" stroke="#AFD3C2" stroke-width="1.5"/>
    <text x="175" y="412" font-size="18" font-weight="800" fill="#1E5B43" text-anchor="middle">POPULATION</text>
    <text x="175" y="432" font-size="12.5" fill="#4F7A68" text-anchor="middle">8 harnesses</text>
    <use href="#hg" transform="translate(96,462) scale(0.86)"/>
    <use href="#hg" transform="translate(96,486) scale(0.86)"/>
    <use href="#hg" transform="translate(96,510) scale(0.86)"/>
    <text x="258" y="514" font-size="13" font-weight="700" fill="#4F7A68" text-anchor="end">&#215;8</text>
  </g>
  <line x1="270" y1="455" x2="300" y2="455" stroke="#9A9A90" stroke-width="2.5" marker-end="url(#arr)"/>
  <!-- 2 SCORE -->
  <g>
    <rect x="304" y="380" width="190" height="150" rx="14" fill="#ECEAE3" stroke="#D8D4C8" stroke-width="1.5"/>
    <text x="399" y="412" font-size="18" font-weight="800" fill="#54504A" text-anchor="middle">SCORE</text>
    <text x="399" y="432" font-size="12.5" fill="#7E7B73" text-anchor="middle">each bot vs the ladder</text>
    <!-- mini ladder bars -->
    <g>
      <rect x="334" y="500" width="26" height="14" fill="#C9C7C0"/><text x="347" y="524" font-size="9.5" fill="#9A9A90" text-anchor="middle">weak</text>
      <rect x="368" y="488" width="26" height="26" fill="#9FBEAF"/><text x="381" y="524" font-size="9.5" fill="#9A9A90" text-anchor="middle">mod</text>
      <rect x="402" y="476" width="26" height="38" fill="#5E9379"/><text x="415" y="524" font-size="9.5" fill="#9A9A90" text-anchor="middle">strong</text>
      <rect x="436" y="492" width="26" height="22" fill="#C2603A"/><text x="449" y="524" font-size="9.5" fill="#9A9A90" text-anchor="middle">Sonnet</text>
    </g>
  </g>
  <line x1="494" y1="455" x2="524" y2="455" stroke="#9A9A90" stroke-width="2.5" marker-end="url(#arr)"/>
  <!-- 3 SELECT -->
  <g>
    <rect x="528" y="380" width="190" height="150" rx="14" fill="#D9ECE3" stroke="#AFD3C2" stroke-width="1.5"/>
    <text x="623" y="412" font-size="18" font-weight="800" fill="#1E5B43" text-anchor="middle">SELECT</text>
    <text x="623" y="432" font-size="12.5" fill="#4F7A68" text-anchor="middle">top 4 survive &#183; elitism</text>
    <use href="#hg" transform="translate(548,460) scale(0.82)"/>
    <use href="#hg" transform="translate(548,482) scale(0.82)"/>
    <rect x="540" y="496" width="166" height="34" rx="8" fill="#BFE3D2" opacity="0.55"/>
    <use href="#hg" transform="translate(548,506) scale(0.82)"/>
    <text x="700" y="528" font-size="11" font-weight="700" fill="#1E5B43" text-anchor="end">keep</text>
  </g>
  <line x1="718" y1="455" x2="748" y2="455" stroke="#9A9A90" stroke-width="2.5" marker-end="url(#arr)"/>
  <!-- 4 BREED -->
  <g>
    <rect x="752" y="380" width="190" height="150" rx="14" fill="#E7E0EE" stroke="#CBBCDD" stroke-width="1.5"/>
    <text x="847" y="412" font-size="18" font-weight="800" fill="#4B3A66" text-anchor="middle">BREED</text>
    <text x="847" y="432" font-size="12.5" fill="#6E5F87" text-anchor="middle">4 challengers &#183; Sonnet</text>
    <text x="847" y="466" font-size="11.5" fill="#6E5F87" text-anchor="middle">reflect &amp; mutate, 4 lenses:</text>
    <text x="847" y="488" font-size="11.5" font-weight="600" fill="#4B3A66" text-anchor="middle">strategy &#183; concept</text>
    <text x="847" y="506" font-size="11.5" font-weight="600" fill="#4B3A66" text-anchor="middle">decomposition &#183; robustness</text>
  </g>
  <line x1="942" y1="455" x2="972" y2="455" stroke="#9A9A90" stroke-width="2.5" marker-end="url(#arr)"/>
  <!-- 5 VERIFIED DUEL -->
  <g>
    <rect x="976" y="380" width="200" height="150" rx="14" fill="#FFFFFF" stroke="#AFD3C2" stroke-width="2.5"/>
    <text x="1076" y="410" font-size="17" font-weight="800" fill="#1E5B43" text-anchor="middle">VERIFIED DUEL</text>
    <text x="1076" y="429" font-size="12" fill="#4F7A68" text-anchor="middle">challenger vs its parent</text>
    <!-- duel: challenger vs parent -->
    <use href="#hg" transform="translate(992,462) scale(0.8)"/>
    <text x="1076" y="466" font-size="13" font-weight="800" fill="#7E7B73" text-anchor="middle">vs</text>
    <use href="#hg" transform="translate(1106,462) scale(0.8)"/>
    <text x="1076" y="492" font-size="11.5" fill="#7E7B73" text-anchor="middle">paired games, 95% CI</text>
    <!-- outcomes -->
    <g>
      <circle cx="1012" cy="514" r="8" fill="#2E7D5B"/><path d="M1008 514 l3 3 l6 -7" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="1026" y="518" font-size="11.5" font-weight="700" fill="#2E6B52">beats parent &#8594; advances</text>
    </g>
    <g>
      <circle cx="1012" cy="514" r="8" fill="#2E7D5B" opacity="0"/>
    </g>
  </g>
  <!-- discard arrow down from duel -->
  <path d="M1076 530 L1076 560" stroke="#B5543E" stroke-width="2.5" marker-end="url(#arr)"/>
  <g>
    <rect x="986" y="566" width="180" height="34" rx="10" fill="#FBEDE8"/>
    <circle cx="1008" cy="583" r="7" fill="#B5543E"/><path d="M1004 579 l8 8 M1012 579 l-8 8" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    <text x="1022" y="588" font-size="12" font-weight="700" fill="#9C4733">if not &#8212; discarded</text>
  </g>

  <!-- exit to champion (after 4 gens) -->
  <path d="M1176 440 L1230 440" stroke="#9A9A90" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="1206" y="424" font-size="12" font-weight="700" fill="#7E7B73" text-anchor="middle">after &#215;4</text>

  <!-- ===== CHAMPION ===== -->
  <rect x="1232" y="372" width="288" height="166" rx="16" fill="#C2603A" opacity="0.10"/>
  <rect x="1240" y="380" width="280" height="150" rx="16" fill="url(#clay)"/>
  <use href="#star" transform="translate(1276,416)"/>
  <text x="1300" y="421" font-size="20" font-weight="800" fill="#FFFFFF">CHAMPION</text>
  <text x="1264" y="452" font-size="14.5" font-weight="700" fill="#FFE9DE">g03_02 &#183; added a combat specialist</text>
  <text x="1264" y="478" font-size="13.5" fill="#FBE0D4">0.62 win-rate vs the fixed ladder</text>
  <text x="1264" y="500" font-size="13.5" fill="#FBE0D4">5 of 16 challengers won their duel</text>
  <use href="#hg" transform="translate(1262,518) scale(0.9)"/>

  <!-- generation progression strip -->
  <text x="80" y="650" font-size="14" font-weight="700" letter-spacing="1" fill="#7E7B73">CHAMPION FITNESS, GENERATION BY GENERATION (best-so-far, monotone by construction)</text>
  <g font-size="13" fill="#54504A">
    <!-- axis -->
    <line x1="90" y1="800" x2="1180" y2="800" stroke="#D8D4C8" stroke-width="2"/>
    <!-- points: 0.547,0.547,0.547,0.592,0.607  mapped: y = 800 - (v-0.5)*900 -->
    <polyline points="170,757.7 410,757.7 650,757.7 890,717.2 1130,703.7" fill="none" stroke="#C2603A" stroke-width="3"/>
    <g fill="#C2603A">
      <circle cx="170" cy="757.7" r="6"/><circle cx="410" cy="757.7" r="6"/><circle cx="650" cy="757.7" r="6"/><circle cx="890" cy="717.2" r="6"/><circle cx="1130" cy="703.7" r="6"/>
    </g>
    <g text-anchor="middle" fill="#7E7B73" font-size="12.5">
      <text x="170" y="824">gen 0</text><text x="410" y="824">gen 1</text><text x="650" y="824">gen 2</text><text x="890" y="824">gen 3</text><text x="1130" y="824">gen 4</text>
    </g>
    <text x="170" y="744" font-size="12.5" fill="#54504A" text-anchor="middle">0.547</text>
    <text x="1130" y="690" font-size="13" font-weight="700" fill="#B5502C" text-anchor="middle">0.617</text>
    <text x="905" y="710" font-size="11.5" fill="#B5502C" text-anchor="start">&#8593; combat specialist admitted</text>
  </g>

  <!-- footer grounding note -->
  <text x="1230" y="660" font-size="12" fill="#9A9A90">"Tournament" = ladder competition + verified</text>
  <text x="1230" y="678" font-size="12" fill="#9A9A90">parent-vs-child duels (not a knockout bracket).</text>
  <text x="1230" y="696" font-size="12" fill="#9A9A90">Run: 8 harnesses &#215; 4 generations.</text>
</svg>
