<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="300" viewBox="0 0 1000 300" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif"><rect width="1000" height="300" fill="#f9f7f4"/><defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#7a756e"/></marker><marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2d7a4a"/></marker><marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#b84040"/></marker></defs><text x="44" y="34" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" font-weight="700" fill="#c17f3a" text-anchor="start" letter-spacing="0.14em">THE SELF-IMPROVEMENT LOOP</text><text x="44" y="60" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="18" font-weight="800" fill="#1a1814" text-anchor="start">One fixed model plays every role — miner, proposer, and the harness being improved</text><rect x="44" y="90" width="216" height="130" rx="10" fill="#fff" stroke="#3a6ea5" stroke-width="1.6"/><rect x="44" y="90" width="216" height="5" rx="0" fill="#3a6ea5"/><text x="58" y="120" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="800" fill="#3a6ea5" text-anchor="start">1 · WEAKNESS MINING</text><text x="58" y="144" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#4a4640" text-anchor="start">Run the current harness,</text><text x="58" y="162" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#4a4640" text-anchor="start">cluster its verifier-grounded</text><text x="58" y="180" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#4a4640" text-anchor="start">failures into patterns.</text><line x1="263" y1="155.0" x2="279" y2="155.0" stroke="#7a756e" stroke-width="1.6" marker-end="url(#a)"/><rect x="282" y="90" width="216" height="130" rx="10" fill="#fff" stroke="#c17f3a" stroke-width="1.6"/><rect x="282" y="90" width="216" height="5" rx="0" fill="#c17f3a"/><text x="296" y="120" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="800" fill="#c17f3a" text-anchor="start">2 · HARNESS PROPOSAL</text><text x="296" y="144" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#4a4640" text-anchor="start">Propose K bounded, minimal</text><text x="296" y="162" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#4a4640" text-anchor="start">edits to declared surfaces</text><text x="296" y="180" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#4a4640" text-anchor="start">(structure · prompts · runtime).</text><line x1="501" y1="155.0" x2="517" y2="155.0" stroke="#7a756e" stroke-width="1.6" marker-end="url(#a)"/><rect x="520" y="90" width="216" height="130" rx="10" fill="#fff" stroke="#2d7a4a" stroke-width="1.6"/><rect x="520" y="90" width="216" height="5" rx="0" fill="#2d7a4a"/><text x="534" y="120" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="800" fill="#2d7a4a" text-anchor="start">3 · VALIDATION</text><text x="534" y="144" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#4a4640" text-anchor="start">Re-solve on two splits;</text><text x="534" y="162" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#4a4640" text-anchor="start">accept iff non-regressive</text><text x="534" y="180" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#4a4640" text-anchor="start">(Δin ≥ 0 ∧ Δout ≥ 0 ∧ max &gt; 0).</text><line x1="739" y1="155.0" x2="755" y2="155.0" stroke="#7a756e" stroke-width="1.6" marker-end="url(#a)"/><rect x="758" y="90" width="216" height="130" rx="10" fill="#fff" stroke="#1a1814" stroke-width="1.6"/><rect x="758" y="90" width="216" height="5" rx="0" fill="#1a1814"/><text x="772" y="120" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="800" fill="#1a1814" text-anchor="start">4 · MERGE</text><text x="772" y="144" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#4a4640" text-anchor="start">Compose accepted edits over</text><text x="772" y="162" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#4a4640" text-anchor="start">disjoint surfaces → next</text><text x="772" y="180" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#4a4640" text-anchor="start">harness. Repeat.</text><path d="M 866.0 228 C 866.0 260, 152.0 260, 152.0 228" fill="none" stroke="#7a756e" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#a)"/><text x="500.0" y="264" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#7a756e" text-anchor="middle">the accepted harness becomes the next round’s starting point</text><text x="44" y="284" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#7a756e" text-anchor="start">The proposer is Haiku itself (not a stronger model) — the distinction from Meta-Harness / GEPA, where a larger model mutates the harness.</text></svg>