<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="340" viewBox="0 0 1000 340" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif"><rect width="1000" height="340" fill="#f9f7f4"/><defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#7a756e"/></marker><marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2d7a4a"/></marker><marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#b84040"/></marker></defs><text x="44" y="34" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" font-weight="700" fill="#c17f3a" text-anchor="start" letter-spacing="0.14em">DIAGNOSIS → REPAIR</text><text x="44" y="60" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="18" font-weight="800" fill="#1a1814" text-anchor="start">Each round’s mined failure correctly motivates the next structural fix</text><text x="44" y="112" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="800" fill="#1a1814" text-anchor="start">ROUND 0  ·  mines h₀</text><rect x="44" y="120" width="150" height="16" rx="8" fill="#fff" stroke="#3a6ea5" stroke-width="1.2"/><text x="119" y="132" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" font-weight="600" fill="#3a6ea5" text-anchor="middle">mining support 5</text><text x="214" y="108" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#4a4640" text-anchor="start" font-style="italic">“fixes the symptom, not the root cause;</text><text x="214" y="124" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#4a4640" text-anchor="start" font-style="italic">misses other affected components”</text><line x1="600" y1="116" x2="636" y2="116" stroke="#2d7a4a" stroke-width="1.8" marker-end="url(#ag)"/><rect x="646" y="104" width="300" height="26" rx="6" fill="#fff" stroke="#2d7a4a" stroke-width="1.5"/><text x="660" y="121" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#2d7a4a" text-anchor="start">+ fix step  &amp;  root-cause policy</text><text x="956" y="121" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" font-weight="800" fill="#1a1814" text-anchor="end">→ h₁</text><line x1="44" y1="154" x2="956" y2="154" stroke="#e8e3dc" stroke-width="1"/><text x="44" y="180" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="800" fill="#1a1814" text-anchor="start">ROUND 1  ·  mines h₁</text><rect x="44" y="188" width="150" height="16" rx="8" fill="#fff" stroke="#3a6ea5" stroke-width="1.2"/><text x="119" y="200" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" font-weight="600" fill="#3a6ea5" text-anchor="middle">mining support 6</text><text x="214" y="176" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#4a4640" text-anchor="start" font-style="italic">“patches pass without a reproduction</text><text x="214" y="192" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#4a4640" text-anchor="start" font-style="italic">test; verification doesn’t enforce one”</text><line x1="600" y1="184" x2="636" y2="184" stroke="#2d7a4a" stroke-width="1.8" marker-end="url(#ag)"/><rect x="646" y="172" width="300" height="26" rx="6" fill="#fff" stroke="#2d7a4a" stroke-width="1.5"/><text x="660" y="189" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#2d7a4a" text-anchor="start">+ write_test step   (18 → 23)</text><text x="956" y="189" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" font-weight="800" fill="#1a1814" text-anchor="end">→ h₂</text><line x1="44" y1="222" x2="956" y2="222" stroke="#e8e3dc" stroke-width="1"/><text x="44" y="248" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12.5" font-weight="800" fill="#1a1814" text-anchor="start">ROUND 2  ·  mines h₂</text><rect x="44" y="256" width="150" height="16" rx="8" fill="#fff" stroke="#3a6ea5" stroke-width="1.2"/><text x="119" y="268" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" font-weight="600" fill="#3a6ea5" text-anchor="middle">mining support 2</text><text x="214" y="244" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#4a4640" text-anchor="start" font-style="italic">“the reproduction test’s coverage</text><text x="214" y="260" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#4a4640" text-anchor="start" font-style="italic">is incomplete”</text><line x1="600" y1="252" x2="636" y2="252" stroke="#b84040" stroke-width="1.8" marker-end="url(#ar)"/><rect x="646" y="240" width="300" height="26" rx="6" fill="#fff" stroke="#b84040" stroke-width="1.5"/><text x="660" y="257" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#b84040" text-anchor="start">refine test quality — all rejected</text><text x="956" y="257" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" font-weight="800" fill="#1a1814" text-anchor="end">→ h₃ = h₂</text><text x="44" y="324" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#7a756e" text-anchor="start">The model recognized, in order: I need to refine → I need an independent test to refine against → my test coverage is now the bottleneck.</text></svg>