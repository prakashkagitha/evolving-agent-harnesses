oe UI,Helvetica,Arial,sans-serif" font-size="26" font-weight="800" fill="#2d7a4a" text-anchor="end">82%</text><text x="958" y="170" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" font-weight="400" fill="#7a756e" text-anchor="end">resolved</text><rect x="774" y="180" width="184" height="7" rx="3" fill="#e8e3dc"/><rect x="774" y="180" width="150.88" height="7" rx="3" fill="#2d7a4a"/><rect x="774" y="212" width="30" height="26" rx="6" fill="#1a1814"/><text x="789.0" y="229" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="800" fill="#fff" text-anchor="middle">D</text><line x1="805" y1="225" x2="815" y2="225" stroke="#7a756e" stroke-width="1.4" marker-end="url(#a)"/><rect x="816" y="212" width="30" height="26" rx="6" fill="#3a6ea5"/><text x="831.0" y="229" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="800" fill="#fff" text-anchor="middle">W</text><line x1="847" y1="225" x2="857" y2="225" stroke="#7a756e" stroke-width="1.4" marker-end="url(#a)"/><rect x="858" y="212" width="30" height="26" rx="6" fill="#2d7a4a"/><text x="873.0" y="229" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="800" fill="#fff" text-anchor="middle">F</text><line x1="774" y1="258" x2="958" y2="258" stroke="#e8e3dc" stroke-width="1"/><text x="774" y="282" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" font-weight="800" fill="#7a756e" text-anchor="start">locked in</text><text x="774" y="304" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#4a4640" text-anchor="start">round-3 edits all rejected</text><text x="774" y="320" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#4a4640" text-anchor="start">→ carried</text><text x="44" y="408" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#7a756e" text-anchor="start">Each step is the model’s own edit, accepted only after re-solving the benchmark. The big jump comes when Haiku adds the reproduction-test step it diagnosed it was missing.</text></svg>