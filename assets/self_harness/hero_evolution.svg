<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="430" viewBox="0 0 1000 430" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif"><rect width="1000" height="430" fill="#f9f7f4"/><defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#7a756e"/></marker><marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2d7a4a"/></marker><marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#b84040"/></marker></defs><text x="44" y="34" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" font-weight="700" fill="#c17f3a" text-anchor="start" letter-spacing="0.14em">SELF-HARNESS · SWE-BENCH VERIFIED</text><text x="44" y="64" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="22" font-weight="800" fill="#1a1814" text-anchor="start">A fixed Haiku model rebuilt its own harness — and resolved 64% → 82% of issues</text><text x="44" y="88" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" font-weight="400" fill="#4a4640" text-anchor="start">No weight updates. No stronger model. Haiku reads its own failures, proposes bounded harness edits, and a two-split verifier keeps only what helps.</text><rect x="44" y="120" width="216" height="250" rx="12" fill="#fff" stroke="#e8e3dc" stroke-width="1.2"/><text x="60" y="150" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="18" font-weight="800" fill="#1a1814" text-anchor="start">h₀</text><text x="244" y="154" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="26" font-weight="800" fill="#4a4640" text-anchor="end">64%</text><text x="244" y="170" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" font-weight="400" fill="#7a756e" text-anchor="end">resolved</text><rect x="60" y="180" width="184" height="7" rx="3" fill="#e8e3dc"/><rect x="60" y="180" width="117.76" height="7" rx="3" fill="#7a756e"/><rect x="60" y="212" width="30" height="26" rx="6" fill="#1a1814"/><text x="75.0" y="229" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="800" fill="#fff" text-anchor="middle">D</text><line x1="60" y1="258" x2="244" y2="258" stroke="#e8e3dc" stroke-width="1"/><text x="60" y="282" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" font-weight="800" fill="#7a756e" text-anchor="start">minimal seed</text><text x="60" y="304" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#4a4640" text-anchor="start">single draft = 1-shot</text><text x="60" y="320" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#4a4640" text-anchor="start">Haiku</text><line x1="263" y1="245.0" x2="279" y2="245.0" stroke="#7a756e" stroke-width="1.6" marker-end="url(#a)"/><rect x="282" y="120" width="216" height="250" rx="12" fill="#fff" stroke="#e8e3dc" stroke-width="1.2"/><text x="298" y="150" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="18" font-weight="800" fill="#1a1814" text-anchor="start">h₁</text><text x="482" y="154" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="26" font-weight="800" fill="#4a4640" text-anchor="end">64%</text><text x="482" y="170" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" font-weight="400" fill="#7a756e" text-anchor="end">resolved</text><rect x="298" y="180" width="184" height="7" rx="3" fill="#e8e3dc"/><rect x="298" y="180" width="117.76" height="7" rx="3" fill="#7a756e"/><rect x="298" y="212" width="30" height="26" rx="6" fill="#1a1814"/><text x="313.0" y="229" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="800" fill="#fff" text-anchor="middle">D</text><line x1="329" y1="225" x2="339" y2="225" stroke="#7a756e" stroke-width="1.4" marker-end="url(#a)"/><rect x="340" y="212" width="30" height="26" rx="6" fill="#2d7a4a"/><text x="355.0" y="229" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="800" fill="#fff" text-anchor="middle">F</text><line x1="298" y1="258" x2="482" y2="258" stroke="#e8e3dc" stroke-width="1"/><text x="298" y="282" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" font-weight="800" fill="#2d7a4a" text-anchor="start">+ refine step</text><text x="298" y="304" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#4a4640" text-anchor="start">authored a root-cause</text><text x="298" y="320" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#4a4640" text-anchor="start">runtime policy</text><line x1="501" y1="245.0" x2="517" y2="245.0" stroke="#7a756e" stroke-width="1.6" marker-end="url(#a)"/><rect x="520" y="120" width="216" height="250" rx="12" fill="#fff" stroke="#e8e3dc" stroke-width="1.2"/><text x="536" y="150" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="18" font-weight="800" fill="#1a1814" text-anchor="start">h₂</text><text x="720" y="154" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="26" font-weight="800" fill="#2d7a4a" text-anchor="end">82%</text><text x="720" y="170" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" font-weight="400" fill="#7a756e" text-anchor="end">resolved</text><rect x="536" y="180" width="184" height="7" rx="3" fill="#e8e3dc"/><rect x="536" y="180" width="150.88" height="7" rx="3" fill="#2d7a4a"/><r