<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="440" viewBox="0 0 1000 440" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif"><rect width="1000" height="440" fill="#f9f7f4"/><defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#7a756e"/></marker><marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2d7a4a"/></marker><marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#b84040"/></marker></defs><text x="44" y="34" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" font-weight="700" fill="#c17f3a" text-anchor="start" letter-spacing="0.14em">WHAT THE MODEL EVOLVED</text><text x="44" y="60" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="18" font-weight="800" fill="#1a1814" text-anchor="start">Most of the gain was structure and runtime policy — not prose</text><text x="44" y="88" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" font-weight="800" fill="#1a1814" text-anchor="start">STRUCTURE</text><text x="44" y="135" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#7a756e" text-anchor="start">h₀</text><rect x="78" y="118" width="30" height="26" rx="6" fill="#1a1814"/><text x="93.0" y="135" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="800" fill="#fff" text-anchor="middle">D</text><text x="44" y="181" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#7a756e" text-anchor="start">h₁</text><rect x="78" y="164" width="30" height="26" rx="6" fill="#1a1814"/><text x="93.0" y="181" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="800" fill="#fff" text-anchor="middle">D</text><line x1="109" y1="177" x2="119" y2="177" stroke="#7a756e" stroke-width="1.4" marker-end="url(#a)"/><rect x="120" y="164" width="30" height="26" rx="6" fill="#2d7a4a"/><text x="135.0" y="181" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="800" fill="#fff" text-anchor="middle">F</text><text x="44" y="227" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#7a756e" text-anchor="start">h₂</text><rect x="78" y="210" width="30" height="26" rx="6" fill="#1a1814"/><text x="93.0" y="227" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="800" fill="#fff" text-anchor="middle">D</text><line x1="109" y1="223" x2="119" y2="223" stroke="#7a756e" stroke-width="1.4" marker-end="url(#a)"/><rect x="120" y="210" width="30" height="26" rx="6" fill="#3a6ea5"/><text x="135.0" y="227" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="800" fill="#fff" text-anchor="middle">W</text><line x1="151" y1="223" x2="161" y2="223" stroke="#7a756e" stroke-width="1.4" marker-end="url(#a)"/><rect x="162" y="210" width="30" height="26" rx="6" fill="#2d7a4a"/><text x="177.0" y="227" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="800" fill="#fff" text-anchor="middle">F</text><text x="44" y="278" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" font-weight="800" fill="#2d7a4a" text-anchor="start">D → D·F → D·W·F</text><text x="44" y="300" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#4a4640" text-anchor="start">grew a refine step, then an</text><text x="44" y="316" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#4a4640" text-anchor="start">independent reproduction-test step.</text><text x="368" y="88" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" font-weight="800" fill="#1a1814" text-anchor="start">RUNTIME POLICY  (harness.json)</text><rect x="368" y="102" width="300" height="30" rx="6" fill="#fdf3ec" stroke="#e8e3dc" stroke-width="1"/><text x="380" y="121" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" font-weight="600" fill="#7a756e" text-anchor="start">h₀:  { }  — empty</text><text x="368" y="154" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="700" fill="#2d7a4a" text-anchor="start">authored from empty →</text><rect x="368" y="172" width="300" height="18" rx="4" fill="#fff" stroke="#e8e3dc" stroke-width="1"/><text x="376" y="185" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" font-weight="500" fill="#4a4640" text-anchor="start">+ system_preamble — root-cause rule</text><rect x="368" y="194" width="300" height="18" rx="4" fill="#fff" stroke="#e8e3dc" stroke-width="1"/><text x="376" y="207" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" font-weight="500" fill="#4a4640" text-anchor="start">+ bootstrap — 5-step scope analysis</text><rect x="368" y="216" width="300" height="18" rx="4" fill="#fff" stroke="#e8e3dc" stroke-width="1"/><text x="376" y="229" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" font-weight="500" fill="#4a4640" text-anchor="start">+ verification — independent repro test</text><rect x="368" y="238" width="300" height="18" rx="4" fill="#fff" stroke="#e8e3dc" stroke-width="1"/><text x="376" y="251" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" font-weight="500" fill="#4a4640" text-anchor="start">+ failure_recovery + error_middleware</text><rect x="368" y="260" width="300" height="18" rx="4" fill="#fff" stroke="#e8e3dc" stroke-width="1"/><text x="376" y="273" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" font-weight="500" fill="#4a4640" text-anchor="start">+ max_tool_calls = 100</text><rect x="368" y="282" width="300" height="18" rx="4" fill="#fff" stroke="#e8e3dc" stroke-width="1"/><text x="376" y="295" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" font-weight="500" fill="#4a4640" text-anchor="start">+ redirect_after_calls = 35</text><text x="692" y="88" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" font-weight="800" fill="#1a1814" text-anchor="start">PROMPTS  (surgical)</text><text x="692" y="121" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#1a1814" text-anchor="start">draft.md</text><rect x="788" y="108" width="74" height="18" rx="9" fill="#fff" stroke="#2d7a4a" stroke-width="1.3"/><text x="825" y="121" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" font-weight="700" fill="#2d7a4a" text-anchor="middle">changed</text><text x="692" y="143" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10.5" font-weight="400" fill="#4a4640" text-anchor="start" font-style="italic">+ “your fix WILL be validated</text><text x="692" y="161" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10.5" font-weight="400" fill="#4a4640" text-anchor="start" font-style="italic">  against a reproduction test”</text><text x="692" y="181" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#1a1814" text-anchor="start">fix.md</text><rect x="788" y="168" width="74" height="18" rx="9" fill="#fff" stroke="#2d7a4a" stroke-width="1.3"/><text x="825" y="181" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" font-weight="700" fill="#2d7a4a" text-anchor="middle">changed</text><text x="692" y="203" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10.5" font-weight="400" fill="#4a4640" text-anchor="start" font-style="italic">+ “if the test still fails, you</text><text x="692" y="221" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10.5" font-weight="400" fill="#4a4640" text-anchor="start" font-style="italic">  fixed a symptom, not the cause”</text><text x="692" y="241" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#1a1814" text-anchor="start">write_test.md</text><rect x="788" y="228" width="74" height="18" rx="9" fill="#fff" stroke="#7a756e" stroke-width="1.3"/><text x="825" y="241" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" font-weight="700" fill="#7a756e" text-anchor="middle">unchanged</text><text x="692" y="265" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="12" font-weight="700" fill="#1a1814" text-anchor="start">critique.md</text><rect x="788" y="252" width="74" height="18" rx="9" fill="#fff" stroke="#7a756e" stroke-width="1.3"/><text x="825" y="265" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10" font-weight="700" fill="#7a756e" text-anchor="middle">unchanged</text><text x="692" y="298" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#4a4640" text-anchor="start">Only draft &amp; fix got one clause</text><text x="692" y="314" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#4a4640" text-anchor="start">each; the test/critique text was left</text><text x="692" y="330" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#4a4640" text-anchor="start">as-is. Intelligence went to design.</text></svg>