<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="340" viewBox="0 0 1000 340" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif"><rect width="1000" height="340" fill="#f9f7f4"/><defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#7a756e"/></marker><marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2d7a4a"/></marker><marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#b84040"/></marker></defs><text x="44" y="34" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" font-weight="700" fill="#c17f3a" text-anchor="start" letter-spacing="0.14em">ONE SWE-BENCH VERIFIED TASK</text><text x="44" y="60" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="18" font-weight="800" fill="#1a1814" text-anchor="start">A real GitHub bug, fixed by code, graded by the repository’s own tests</text><rect x="44" y="92" width="300" height="176" rx="10" fill="#fff" stroke="#3a6ea5" stroke-width="1.6"/><rect x="44" y="92" width="300" height="5" rx="6" fill="#3a6ea5"/><text x="58" y="122" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="800" fill="#3a6ea5" text-anchor="start">THE TASK</text><text x="58" y="150" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#1a1814" text-anchor="start">A real GitHub issue</text><text x="58" y="170" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#4a4640" text-anchor="start">the actual bug report / feature</text><text x="58" y="186" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#4a4640" text-anchor="start">request, in the user’s words</text><text x="58" y="218" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#1a1814" text-anchor="start">The repository</text><text x="58" y="238" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#4a4640" text-anchor="start">checked out at the commit</text><text x="58" y="254" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#4a4640" text-anchor="start">just before the fix</text><rect x="368" y="92" width="300" height="176" rx="10" fill="#fff" stroke="#1a1814" stroke-width="1.6"/><rect x="368" y="92" width="300" height="5" rx="6" fill="#1a1814"/><text x="382" y="122" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="800" fill="#1a1814" text-anchor="start">THE HARNESS  (fixed Haiku)</text><rect x="382" y="144" width="30" height="26" rx="6" fill="#1a1814"/><text x="397.0" y="161" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="800" fill="#fff" text-anchor="middle">D</text><line x1="413" y1="157" x2="423" y2="157" stroke="#7a756e" stroke-width="1.4" marker-end="url(#a)"/><rect x="424" y="144" width="30" height="26" rx="6" fill="#3a6ea5"/><text x="439.0" y="161" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="800" fill="#fff" text-anchor="middle">W</text><line x1="455" y1="157" x2="465" y2="157" stroke="#7a756e" stroke-width="1.4" marker-end="url(#a)"/><rect x="466" y="144" width="30" height="26" rx="6" fill="#2d7a4a"/><text x="481.0" y="161" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="14" font-weight="800" fill="#fff" text-anchor="middle">F</text><text x="382" y="200" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#4a4640" text-anchor="start">edits the real source until</text><text x="382" y="216" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#4a4640" text-anchor="start">the fix is right, then emits</text><text x="382" y="240" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#1a1814" text-anchor="start">a patch</text><text x="428" y="240" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#7a756e" text-anchor="start">(git diff)</text><rect x="692" y="92" width="300" height="176" rx="10" fill="#fff" stroke="#2d7a4a" stroke-width="1.6"/><rect x="692" y="92" width="300" height="5" rx="6" fill="#2d7a4a"/><text x="706" y="122" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="800" fill="#2d7a4a" text-anchor="start">THE VERDICT  ·  hidden unit tests</text><rect x="706" y="136" width="272" height="34" rx="6" fill="#f2f7f3"/><text x="714" y="155" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" font-weight="600" fill="#2d7a4a" text-anchor="start">FAIL→PASS   tests that must now pass</text><rect x="706" y="176" width="272" height="34" rx="6" fill="#f2f7f3"/><text x="714" y="195" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11" font-weight="600" fill="#2d7a4a" text-anchor="start">PASS→PASS   tests that must still pass</text><text x="706" y="238" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="13" font-weight="800" fill="#2d7a4a" text-anchor="start">RESOLVED</text><text x="784" y="238" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#4a4640" text-anchor="start">only if all of both pass</text><line x1="347" y1="180.0" x2="365" y2="180.0" stroke="#7a756e" stroke-width="1.8" marker-end="url(#a)"/><line x1="671" y1="180.0" x2="689" y2="180.0" stroke="#7a756e" stroke-width="1.8" marker-end="url(#a)"/><text x="44" y="324" font-family="system-ui,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="11.5" font-weight="400" fill="#7a756e" text-anchor="start">A deterministic, deployable verifier — not an LLM judge. Grading runs in the official SWE-bench container (rootless, via Apptainer).</text></svg>